<!DOCTYPE html>
<html>
<head>
    <title>Coffee Shop</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5e6cc;
        }

        header {
            background-color: #6f4e37;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background-color: #4b2e2e;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-size: 18px;
        }

        .hero {
            text-align: center;
            padding: 50px;
            background-color: #d9b38c;
        }

        .menu {
            padding: 30px;
            text-align: center;
        }

        .menu-item {
            display: inline-block;
            width: 200px;
            margin: 15px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        footer {
            background-color: #6f4e37;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>☕ Coffee House</h1>
        <p>Fresh Coffee, Fresh Start</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <section class="hero">
        <h2>Welcome to Our Coffee Shop</h2>
        <p>Enjoy the best coffee in town!</p>
    </section>

    <section class="menu">
        <h2>Our Menu</h2>

        <div class="menu-item">
            <h3>Espresso</h3>
            <p>₹80</p>
        </div>

        <div class="menu-item">
            <h3>Cappuccino</h3>
            <p>₹120</p>
        </div>

        <div class="menu-item">
            <h3>Latte</h3>
            <p>₹140</p>
        </div>

        <div class="menu-item">
            <h3>Mocha</h3>
            <p>₹160</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Coffee House. All Rights Reserved.</p>
    </footer>

</body>
</html>
